name: FoxAI Mod - JAR Derle

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradle izinleri ver
        run: chmod +x gradlew

      - name: ForgeGradle setup
        run: ./gradlew --no-daemon setupDecompWorkspace
        timeout-minutes: 15

      - name: JAR Derle
        run: ./gradlew --no-daemon build
        timeout-minutes: 10

      - name: JAR dosyasını yükle
        uses: actions/upload-artifact@v4
        with:
          name: FoxAI-Mod-JAR
          path: build/libs/aiplayermod-*.jar
          retention-days: 30

      - name: Sürüm bilgisi
        run: |
          echo "=== DERLENEN DOSYALAR ==="
          ls -lh build/libs/
          echo "========================="
          echo "JAR hazır! GitHub Actions > Artifacts bölümünden indirebilirsin."
